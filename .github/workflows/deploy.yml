name: Hexo 博客自动部署
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build & Deploy Hexo Blog
        uses: abner1999/hexo-deploy-action@v1
        env:
          TZ: Asia/Shanghai
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
